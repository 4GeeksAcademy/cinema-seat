<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Prototipo visual del sistema de gestion de asientos de cine"
    />
    <title>Reserva de Asientos - Cine Local</title>
    <style>
      :root {
        --bg: #050814;
        --card: rgba(13, 20, 42, 0.78);
        --text: #e0edff;
        --muted: #9cc5ff;
        --accent: #7cc2ff;
        --border: rgba(96, 165, 250, 0.35);
        --glow: rgba(59, 130, 246, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at 10% 10%, rgba(37, 99, 235, 0.22), transparent 40%),
          radial-gradient(circle at 90% 20%, rgba(56, 189, 248, 0.12), transparent 35%),
          radial-gradient(circle at 50% -10%, #111c3a 0%, var(--bg) 58%);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
      }

      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 2.25rem 1.25rem 3.5rem;
      }

      header {
        margin-bottom: 1.5rem;
      }

      h1 {
        margin: 0;
        font-family: "Cinzel", serif;
        font-size: clamp(1.9rem, 3vw, 2.6rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-shadow: 0 2px 22px rgba(56, 189, 248, 0.25);
      }

      .subtitle {
        color: var(--muted);
        margin-top: 0.75rem;
        max-width: 70ch;
      }

      section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.5rem;
        backdrop-filter: blur(8px);
        box-shadow:
          0 22px 48px rgba(2, 6, 23, 0.7),
          inset 0 1px 0 rgba(148, 197, 255, 0.12);
      }

      h2 {
        margin-top: 0;
        color: var(--accent);
        font-family: "Cinzel", serif;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .screen {
        margin: 1.1rem 0 1.45rem;
        text-align: center;
        font-weight: 700;
        letter-spacing: 0.22em;
        color: #eff6ff;
        border: 1px solid #60a5fa;
        border-radius: 999px;
        padding: 0.62rem;
        background: linear-gradient(90deg, #1d4ed8, #0284c7);
        box-shadow:
          0 0 0 2px rgba(12, 74, 110, 0.45),
          0 12px 28px rgba(2, 132, 199, 0.35);
      }

      .seats-grid {
        display: grid;
        grid-template-columns: repeat(10, minmax(40px, 1fr));
        gap: 0.6rem;
        margin-bottom: 1.1rem;
      }

      .seat {
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 0.62rem 0;
        font-size: 0.79rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        animation: seatFadeIn 0.36s ease both;
      }

      .seat:hover {
        transform: translateY(-2px) scale(1.01);
        border-color: #93c5fd;
        box-shadow: 0 12px 22px rgba(15, 23, 42, 0.52);
      }

      .seat.free {
        background: linear-gradient(180deg, #2563eb 0%, #1e40af 100%);
        color: #eff6ff;
        box-shadow: inset 0 -2px 0 rgba(147, 197, 253, 0.25);
      }

      .seat.occupied {
        background: linear-gradient(180deg, #0b1220, #111827);
        color: #64748b;
        border-color: #1f2937;
        cursor: not-allowed;
        box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.7);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      button {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 0.72rem 1.05rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      #adjacent-btn {
        background: linear-gradient(180deg, #3b82f6, #1d4ed8);
        color: #eff6ff;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
      }

      #reset-btn {
        background: #0f172a;
        color: #e2e8f0;
        border-color: #334155;
      }

      .stats {
        display: flex;
        gap: 1rem;
        margin-top: 0.75rem;
        color: #bfdbfe;
        font-weight: 600;
      }

      #message {
        margin-top: 1.05rem;
        padding: 0.85rem;
        border-radius: 10px;
        background: linear-gradient(180deg, #172554, #1e293b);
        color: #dbeafe;
        border: 1px solid #3b82f6;
        box-shadow: inset 0 0 0 1px rgba(125, 211, 252, 0.08);
      }

      @keyframes seatFadeIn {
        from {
          opacity: 0;
          transform: translateY(6px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 700px) {
        .container {
          padding: 1.3rem 0.85rem 2rem;
        }

        section {
          border-radius: 16px;
          padding: 1rem;
        }

        .seats-grid {
          grid-template-columns: repeat(5, minmax(48px, 1fr));
        }

        .actions {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Reserva de Asientos - Cine Local</h1>
        <p class="subtitle">
          Vista de cliente para consultar disponibilidad, reservar asientos y encontrar dos
          asientos contiguos.
        </p>
      </header>

      <section aria-labelledby="sala-title">
        <h2 id="sala-title">Sala 1: 8 filas x 10 asientos</h2>
        <div class="screen">PANTALLA</div>
        <div id="seats" class="seats-grid" aria-label="Mapa de asientos"></div>

        <div class="stats">
          <span id="occupied-count">Ocupados: 0</span>
          <span id="available-count">Disponibles: 80</span>
        </div>

        <div class="actions">
          <button id="adjacent-btn" type="button">Buscar 2 asientos contiguos</button>
          <button id="reset-btn" type="button">Reiniciar sala</button>
        </div>

        <p id="message">Haz clic en un asiento libre para reservarlo.</p>
      </section>
    </main>

    <script>
      const rows = 8;
      const cols = 10;
      const seatsEl = document.getElementById("seats");
      const occupiedCountEl = document.getElementById("occupied-count");
      const availableCountEl = document.getElementById("available-count");
      const messageEl = document.getElementById("message");
      const adjacentBtn = document.getElementById("adjacent-btn");
      const resetBtn = document.getElementById("reset-btn");

      let matrix = createMatrix(rows, cols);

      function createMatrix(r, c) {
        return Array.from({ length: r }, () => Array(c).fill(0));
      }

      function updateStats() {
        let occupied = 0;
        for (let i = 0; i < rows; i++) {
          for (let j = 0; j < cols; j++) {
            if (matrix[i][j] === 1) occupied++;
          }
        }
        const available = rows * cols - occupied;
        occupiedCountEl.textContent = `Ocupados: ${occupied}`;
        availableCountEl.textContent = `Disponibles: ${available}`;
      }

      function seatLabel(row, col) {
        return `F${String(row + 1).padStart(2, "0")}-A${String(col + 1).padStart(2, "0")}`;
      }

      function printRoomStateToConsole() {
        console.log("\n--- ESTADO ACTUAL DE LA SALA ---");
        for (let r = 0; r < rows; r++) {
          let rowState = "";
          for (let c = 0; c < cols; c++) {
            // Requisito solicitado: X ocupado, L disponible
            rowState += matrix[r][c] === 1 ? "X " : "L ";
          }
          console.log(rowState.trim());
        }
      }

      function renderSeats() {
        seatsEl.innerHTML = "";
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `seat ${matrix[r][c] === 1 ? "occupied" : "free"}`;
            button.textContent = seatLabel(r, c);
            button.disabled = matrix[r][c] === 1;
            button.style.animationDelay = `${(r * cols + c) * 8}ms`;

            button.addEventListener("click", () => {
              if (matrix[r][c] === 0) {
                matrix[r][c] = 1;
                messageEl.textContent = `Reservado ${seatLabel(r, c)} correctamente.`;
                renderSeats();
                updateStats();
                printRoomStateToConsole();
              }
            });

            seatsEl.appendChild(button);
          }
        }
      }

      function findAdjacentSeats() {
        let r = 0;
        while (r < rows) {
          for (let c = 0; c < cols - 1; c++) {
            if (matrix[r][c] === 0 && matrix[r][c + 1] === 0) {
              return [r, c, c + 1];
            }
          }
          r++;
        }
        return null;
      }

      adjacentBtn.addEventListener("click", () => {
        const result = findAdjacentSeats();
        if (result) {
          const [r, c1, c2] = result;
          messageEl.textContent = `Sugerencia: ${seatLabel(r, c1)} y ${seatLabel(r, c2)}.`;
        } else {
          messageEl.textContent = "No hay dos asientos contiguos libres en este momento.";
        }
      });

      resetBtn.addEventListener("click", () => {
        matrix = createMatrix(rows, cols);
        messageEl.textContent = "Sala reiniciada. Todos los asientos estan libres.";
        renderSeats();
        updateStats();
        printRoomStateToConsole();
      });

      renderSeats();
      updateStats();
      printRoomStateToConsole();
    </script>
  </body>
</html>
